name: CI

on:
  push:
    branches-ignore:
      - "dependabot/**"
    paths:
      - "**"
      - "!docs/**"
    tags:
      - "v*"
  pull_request:
    paths:
      - "**"
      - "!docs/**"

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

permissions:
  packages: write
  contents: write # Needed for GitHub releases

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go/go.mod

      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./go

      - name: Run Unit Tests
        run: |
          go mod tidy
          make test

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Linter
        run: cargo clippy -- -D warnings

      - name: Run Unit Tests
        run: cargo test

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Choose a modern stable version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov build twine
          pip install -e .

      - name: Run Unit Tests
        run: pytest

  release:
    name: Release Packages
    needs: [test-go, test-rust, test-python]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Publish Rust Crate
        working-directory: ./rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            cargo publish
          else
            echo "CARGO_REGISTRY_TOKEN is not set. Skipping crates.io publish."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build and Publish Python Package
        working-directory: ./python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload dist/*
          else
            echo "PYPI_API_TOKEN is not set. Skipping PyPI publish."
          fi
